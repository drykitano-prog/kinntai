<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>勤怠管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #1D9E75; --green-dark: #0F6E56; --green-light: #E1F5EEE;
    --bg: #F5F7F6; --surface: #ffffff;
    --border: rgba(0,0,0,0.09); --border-md: rgba(0,0,0,0.15);
    --text: #1a1a1a; --text-muted: #6b7280; --text-hint: #9ca3af;
    --red: #E24B4A; --red-bg: #FEF2F2;
    --radius: 12px; --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 12px rgba(0,0,0,0.04);
  }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; }

  /* Login Screen */
  #login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .login-card {
    background: var(--surface); border-radius: 20px; padding: 40px 32px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.1); width: 100%; max-width: 360px; text-align: center;
  }
  .login-logo { width: 56px; height: 56px; background: var(--green); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
  .login-logo i { color: #fff; font-size: 28px; }
  .login-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .login-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 32px; }
  .pin-input-wrap { display: flex; gap: 8px; justify-content: center; margin-bottom: 24px; }
  .pin-digit {
    width: 56px; height: 64px; border: 2px solid var(--border-md); border-radius: var(--radius-sm);
    font-size: 24px; font-weight: 700; text-align: center; font-family: inherit; color: var(--text);
    background: var(--surface); outline: none; transition: border-color 0.15s;
  }
  .pin-digit:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(29,158,117,0.12); }
  .pin-digit.filled { border-color: var(--green); background: #f0fdf8; }
  .login-error { color: var(--red); font-size: 13px; margin-bottom: 16px; min-height: 20px; }
  .btn-login {
    width: 100%; padding: 14px; background: var(--green); color: #fff; border: none;
    border-radius: var(--radius-sm); font-size: 16px; font-weight: 700; font-family: inherit;
    cursor: pointer; transition: background 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-login:hover { background: var(--green-dark); }
  .btn-login:disabled { background: #d1d5db; cursor: not-allowed; }

  /* App */
  #app-screen { display: none; }
  .app-header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100; padding: 0 16px;
  }
  .header-inner { max-width: 680px; margin: 0 auto; display: flex; align-items: center; gap: 12px; height: 56px; }
  .header-logo { width: 32px; height: 32px; background: var(--green); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .header-logo i { color: #fff; font-size: 18px; }
  .header-title { font-size: 16px; font-weight: 700; }
  .user-badge {
    margin-left: auto; display: flex; align-items: center; gap: 8px;
    background: #f0fdf8; border: 1px solid #a7f3d0; border-radius: 20px; padding: 5px 12px;
  }
  .user-badge i { color: var(--green); font-size: 15px; }
  .user-badge span { font-size: 13px; font-weight: 500; color: var(--green-dark); }
  .logout-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 13px; padding: 4px; }
  .logout-btn:hover { color: var(--red); }

  .container { max-width: 680px; margin: 0 auto; padding: 0 16px 80px; }
  .tabs-wrap { background: var(--surface); border-bottom: 1px solid var(--border); margin-bottom: 16px; }
  .tabs { max-width: 680px; margin: 0 auto; display: flex; padding: 0 16px; }
  .tab { flex: 1; padding: 14px 4px; text-align: center; cursor: pointer; font-size: 13px; color: var(--text-muted); border: none; background: none; border-bottom: 2px solid transparent; font-family: inherit; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 5px; }
  .tab.active { color: var(--green); border-bottom-color: var(--green); }
  .tab i { font-size: 16px; }

  .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 20px; box-shadow: var(--shadow); margin-bottom: 12px; }
  .card-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .card-title i { color: var(--green); font-size: 18px; }

  .field { margin-bottom: 16px; }
  .field label { font-size: 12px; font-weight: 500; color: var(--text-muted); display: block; margin-bottom: 6px; letter-spacing: 0.3px; text-transform: uppercase; }
  .field select, .field input[type="date"], .field input[type="text"], .field input[type="number"] {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border-md); border-radius: var(--radius-sm);
    font-size: 15px; font-family: inherit; color: var(--text); background: var(--surface); outline: none; transition: border-color 0.15s;
  }
  .field select:focus, .field input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(29,158,117,0.12); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .duration-pill { display: inline-flex; align-items: center; gap: 6px; background: #E1F5EE; color: var(--green-dark); border-radius: 20px; padding: 5px 12px; font-size: 13px; font-weight: 500; margin-bottom: 16px; min-height: 28px; }
  .duration-pill.warn { background: #fef2f2; color: var(--red); }

  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; padding: 11px 20px; border-radius: var(--radius-sm); font-size: 15px; font-family: inherit; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-primary { background: var(--green); color: #fff; width: 100%; }
  .btn-primary:hover { background: var(--green-dark); }
  .btn-primary:disabled { background: #d1d5db; cursor: not-allowed; }
  .btn-outline { background: none; border: 1px solid var(--border-md); color: var(--text); font-size: 13px; padding: 7px 14px; }
  .btn-outline:hover { background: var(--bg); }
  .btn-ghost { background: none; border: none; color: var(--red); padding: 4px 6px; font-size: 13px; cursor: pointer; border-radius: 6px; }
  .btn-ghost:hover { background: var(--red-bg); }
  .btn-sm { padding: 7px 14px; font-size: 13px; }

  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1a1a1a; color: #fff; padding: 10px 18px; border-radius: 24px; font-size: 14px; opacity: 0; transition: all 0.25s; pointer-events: none; white-space: nowrap; z-index: 9999; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: var(--text-muted); font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 11px 10px; border-bottom: 1px solid var(--border); color: var(--text); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg); }

  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
  .metric { background: var(--bg); border-radius: var(--radius-sm); padding: 14px; }
  .metric-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .metric-value { font-size: 24px; font-weight: 700; color: var(--text); line-height: 1; }
  .metric-unit { font-size: 13px; font-weight: 400; }

  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .empty { text-align: center; padding: 40px 0; color: var(--text-muted); font-size: 14px; }
  .empty i { font-size: 32px; display: block; margin-bottom: 8px; opacity: 0.4; }

  .member-item { display: flex; align-items: center; justify-content: space-between; padding: 11px 14px; background: var(--bg); border-radius: var(--radius-sm); margin-bottom: 8px; }
  .member-name { font-size: 14px; display: flex; align-items: center; gap: 8px; }
  .pin-badge { font-size: 11px; background: #e5e7eb; color: #6b7280; padding: 2px 8px; border-radius: 10px; font-family: monospace; }
  .add-row { display: grid; grid-template-columns: 1fr 100px auto; gap: 8px; }
</style>
</head>
<body>

<div id="toast"></div>

<!-- ログイン画面 -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo"><i class="ti ti-clock-record"></i></div>
    <div class="login-title">勤怠管理</div>
    <div class="login-sub">4桁のPINを入力してください</div>
    <div class="pin-input-wrap">
      <input class="pin-digit" type="password" maxlength="1" inputmode="numeric" id="p0">
      <input class="pin-digit" type="password" maxlength="1" inputmode="numeric" id="p1">
      <input class="pin-digit" type="password" maxlength="1" inputmode="numeric" id="p2">
      <input class="pin-digit" type="password" maxlength="1" inputmode="numeric" id="p3">
    </div>
    <div class="login-error" id="login-error"></div>
    <button class="btn-login" id="login-btn" onclick="doLogin()">
      <i class="ti ti-login"></i>ログイン
    </button>
  </div>
</div>

<!-- アプリ本体 -->
<div id="app-screen">
  <header class="app-header">
    <div class="header-inner">
      <div class="header-logo"><i class="ti ti-clock-record"></i></div>
      <div class="header-title">勤怠管理</div>
      <div class="user-badge">
        <i class="ti ti-user"></i>
        <span id="current-user-name"></span>
        <button class="logout-btn" onclick="logout()" title="ログアウト"><i class="ti ti-logout" style="font-size:15px"></i></button>
      </div>
    </div>
  </header>

  <div class="tabs-wrap">
    <div class="tabs">
      <button class="tab active" onclick="showTab('input')"><i class="ti ti-clock"></i>打刻</button>
      <button class="tab" onclick="showTab('records')"><i class="ti ti-list"></i>記録</button>
      <button class="tab" onclick="showTab('summary')"><i class="ti ti-chart-bar"></i>集計</button>
      <button class="tab" onclick="showTab('members')"><i class="ti ti-users"></i>メンバー</button>
    </div>
  </div>

  <div class="container">

    <!-- 打刻入力 -->
    <div id="tab-input">
      <div class="card">
        <div class="card-title"><i class="ti ti-clock-check"></i>打刻入力</div>
        <div class="field">
          <label>氏名</label>
          <input type="text" id="name-display" readonly style="background:#f9fafb;color:var(--text-muted)">
        </div>
        <div class="field">
          <label>日付</label>
          <input type="date" id="date-input">
        </div>
        <div class="row2">
          <div class="field"><label>出勤時間</label><select id="time-in"></select></div>
          <div class="field"><label>退勤時間</label><select id="time-out"></select></div>
        </div>
        <div id="duration-pill" class="duration-pill"><i class="ti ti-clock"></i><span>--</span></div>
        <button class="btn btn-primary" id="submit-btn" onclick="submitRecord()">
          <i class="ti ti-check"></i>打刻を記録する
        </button>
      </div>
    </div>

    <!-- 記録一覧 -->
    <div id="tab-records" style="display:none">
      <div class="card">
        <div class="toolbar">
          <div class="card-title" style="margin:0"><i class="ti ti-list"></i>自分の打刻記録</div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-outline btn-sm" onclick="loadRecords()"><i class="ti ti-refresh"></i>更新</button>
            <button class="btn btn-outline btn-sm" onclick="exportCSV()"><i class="ti ti-download"></i>CSV</button>
          </div>
        </div>
        <div id="records-container"><div class="empty"><i class="ti ti-inbox"></i>記録がありません</div></div>
      </div>
    </div>

    <!-- 集計 -->
    <div id="tab-summary" style="display:none">
      <div class="card">
        <div class="card-title"><i class="ti ti-chart-bar"></i>集計</div>
        <div id="summary-metrics"></div>
        <div id="summary-detail"></div>
      </div>
    </div>

    <!-- メンバー管理 -->
    <div id="tab-members" style="display:none">
      <div class="card">
        <div class="card-title"><i class="ti ti-users"></i>メンバー管理</div>
        <div id="member-list"></div>
        <div class="add-row">
          <input type="text" id="new-name" placeholder="名前（例：山田 太郎）">
          <input type="number" id="new-pin" placeholder="PIN" min="1000" max="9999">
          <button class="btn btn-outline" onclick="addMember()"><i class="ti ti-plus"></i>追加</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyHtLRh-CBfYP9caA2wnA8Rfek5bbneJ0qiPMUoHsDzBf_zh9dWjAQzl3hj3sqANsXx2g/exec';

let currentUser = null;
let records = [];

// ── PIN input UX ─────────────────────────
document.querySelectorAll('.pin-digit').forEach((el, i) => {
  el.addEventListener('input', () => {
    el.classList.toggle('filled', el.value !== '');
    if (el.value && i < 3) document.getElementById('p' + (i+1)).focus();
    if (getPIN().length === 4) doLogin();
  });
  el.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !el.value && i > 0) document.getElementById('p' + (i-1)).focus();
  });
});

function getPIN() {
  return ['p0','p1','p2','p3'].map(id => document.getElementById(id).value).join('');
}

function clearPIN() {
  ['p0','p1','p2','p3'].forEach(id => { const el = document.getElementById(id); el.value = ''; el.classList.remove('filled'); });
  document.getElementById('p0').focus();
}

// ── Auth ─────────────────────────────────
async function doLogin() {
  const pin = getPIN();
  if (pin.length < 4) { document.getElementById('login-error').textContent = '4桁のPINを入力してください'; return; }
  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 確認中...';
  document.getElementById('login-error').textContent = '';
  const data = await gasCall({ action: 'login', pin });
  btn.disabled = false;
  btn.innerHTML = '<i class="ti ti-login"></i>ログイン';
  if (!data) { clearPIN(); return; }
  if (!data.success) {
    document.getElementById('login-error').textContent = data.error;
    clearPIN(); return;
  }
  currentUser = data.name;
  sessionStorage.setItem('kintai_user', currentUser);
  showApp();
}

function logout() {
  sessionStorage.removeItem('kintai_user');
  currentUser = null;
  records = [];
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  clearPIN();
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = '';
  document.getElementById('current-user-name').textContent = currentUser;
  document.getElementById('name-display').value = currentUser;
  showTab('input');
}

// ── GAS ──────────────────────────────────
async function gasCall(params) {
  try {
    const res = await fetch(GAS_URL + '?' + new URLSearchParams(params));
    return await res.json();
  } catch(e) { toast('❌ 通信エラー: ' + e.message); return null; }
}

// ── Time ─────────────────────────────────
const pad = n => String(n).padStart(2,'0');
const minsToStr = m => `${pad(Math.floor(m/60))}:${pad(m%60)}`;

function buildTimeOptions(sel, defHour) {
  sel.innerHTML = '';
  for (let h=5;h<=23;h++) for (let m=0;m<60;m+=10) {
    const o = document.createElement('option');
    o.value = h*60+m; o.textContent = `${pad(h)}:${pad(m)}`;
    if (h===defHour && m===0) o.selected = true;
    sel.appendChild(o);
  }
}

function updateDuration() {
  const inV = parseInt(document.getElementById('time-in').value);
  const outV = parseInt(document.getElementById('time-out').value);
  const diff = outV - inV;
  const pill = document.getElementById('duration-pill');
  if (diff > 0) {
    const h=Math.floor(diff/60), m=diff%60;
    pill.className='duration-pill';
    pill.innerHTML=`<i class="ti ti-clock"></i><span>勤務時間：${h}時間${m?m+'分':''}</span>`;
  } else {
    pill.className='duration-pill warn';
    pill.innerHTML=`<i class="ti ti-alert-circle"></i><span>退勤時間を出勤より後に設定してください</span>`;
  }
}

// ── Record ───────────────────────────────
async function submitRecord() {
  const date = document.getElementById('date-input').value;
  const inV = parseInt(document.getElementById('time-in').value);
  const outV = parseInt(document.getElementById('time-out').value);
  if (!date) { toast('⚠️ 日付を選択してください'); return; }
  if (outV <= inV) { toast('⚠️ 退勤時間を正しく設定してください'); return; }
  const btn = document.getElementById('submit-btn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> 送信中...';
  const data = await gasCall({ action:'addRecord', name:currentUser, date, timeIn:minsToStr(inV), timeOut:minsToStr(outV), workMins:outV-inV });
  btn.disabled=false; btn.innerHTML='<i class="ti ti-check"></i>打刻を記録する';
  if (!data||!data.success) { toast('❌ '+(data?.error||'エラー')); return; }
  toast(`✅ 打刻を記録しました（${minsToStr(inV)}〜${minsToStr(outV)}）`);
}

// ── Records ──────────────────────────────
async function loadRecords() {
  const c = document.getElementById('records-container');
  c.innerHTML='<div class="empty"><i class="ti ti-loader"></i>読み込み中...</div>';
  const data = await gasCall({ action:'getRecords', name:currentUser });
  if (!data||!data.success) { c.innerHTML='<div class="empty"><i class="ti ti-alert-circle"></i>読み込みエラー</div>'; return; }
  records = (data.records||[]).sort((a,b)=>a.date<b.date?1:-1);
  if (!records.length) { c.innerHTML='<div class="empty"><i class="ti ti-inbox"></i>記録がありません</div>'; return; }
  c.innerHTML=`<div class="tbl-wrap"><table>
    <thead><tr><th>日付</th><th>出勤</th><th>退勤</th><th>勤務時間</th></tr></thead>
    <tbody>${records.map(r=>`<tr><td>${r.date}</td><td>${r.timeIn}</td><td>${r.timeOut}</td><td>${r.workStr}</td></tr>`).join('')}</tbody>
  </table></div>`;
  renderSummary();
}

// ── Summary ──────────────────────────────
function renderSummary() {
  const sm=document.getElementById('summary-metrics'), sd=document.getElementById('summary-detail');
  if (!records.length) { sm.innerHTML=''; sd.innerHTML='<div class="empty"><i class="ti ti-inbox"></i>記録がありません</div>'; return; }
  const total=records.reduce((s,r)=>s+Number(r.workMins),0);
  const avg=Math.round(total/records.length);
  const th=Math.floor(total/60),tm=total%60,ah=Math.floor(avg/60),am=avg%60;
  sm.innerHTML=`<div class="metrics">
    <div class="metric"><div class="metric-label">出勤日数</div><div class="metric-value">${records.length}<span class="metric-unit"> 日</span></div></div>
    <div class="metric"><div class="metric-label">総勤務</div><div class="metric-value">${th}<span class="metric-unit">h</span>${tm?`${tm}<span class="metric-unit">m</span>`:''}</div></div>
    <div class="metric"><div class="metric-label">平均/日</div><div class="metric-value">${ah}<span class="metric-unit">h</span>${am?`${am}<span class="metric-unit">m</span>`:''}</div></div>
  </div>`;
  sd.innerHTML=`<div class="tbl-wrap"><table>
    <thead><tr><th>日付</th><th>出勤</th><th>退勤</th><th>勤務時間</th></tr></thead>
    <tbody>${records.map(r=>`<tr><td>${r.date}</td><td>${r.timeIn}</td><td>${r.timeOut}</td><td>${r.workStr}</td></tr>`).join('')}</tbody>
  </table></div>`;
}

// ── Members ──────────────────────────────
async function loadMembers() {
  const el=document.getElementById('member-list');
  el.innerHTML='<div class="empty" style="padding:1rem 0">読み込み中...</div>';
  const data=await gasCall({action:'getMembers'});
  if (!data||!data.success) return;
  const members=data.members||[];
  if (!members.length) { el.innerHTML='<div class="empty" style="padding:1rem 0">メンバーがいません</div>'; return; }
  el.innerHTML=members.map(m=>`
    <div class="member-item">
      <span class="member-name"><i class="ti ti-user"></i>${m.name} <span class="pin-badge">PIN: ${m.pin}</span></span>
      <button class="btn-ghost" onclick="removeMember('${m.name}')"><i class="ti ti-trash"></i></button>
    </div>`).join('');
}

async function addMember() {
  const name=document.getElementById('new-name').value.trim();
  const pin=document.getElementById('new-pin').value.trim();
  if (!name) { toast('⚠️ 名前を入力してください'); return; }
  if (!pin||pin.length!==4) { toast('⚠️ PINは4桁で入力してください'); return; }
  const data=await gasCall({action:'addMember',name,pin});
  if (!data) return;
  if (!data.success) { toast('❌ '+data.error); return; }
  document.getElementById('new-name').value='';
  document.getElementById('new-pin').value='';
  toast(`✅「${name}」を追加しました`);
  loadMembers();
}

async function removeMember(name) {
  if (!confirm(`「${name}」を削除しますか？`)) return;
  const data=await gasCall({action:'removeMember',name});
  if (!data||!data.success) { toast('❌ '+(data?.error||'エラー')); return; }
  toast(`🗑「${name}」を削除しました`);
  loadMembers();
}

// ── Export ───────────────────────────────
function exportCSV() {
  if (!records.length) { toast('記録がありません'); return; }
  let csv='\uFEFF日付,出勤時間,退勤時間,勤務時間（分）,勤務時間\n';
  records.forEach(r=>{csv+=`${r.date},${r.timeIn},${r.timeOut},${r.workMins},${r.workStr}\n`;});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=`勤怠記録_${currentUser}.csv`; a.click();
}

// ── Toast ────────────────────────────────
function toast(msg,dur=3000) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),dur);
}

// ── Tabs ─────────────────────────────────
function showTab(tab) {
  ['input','records','summary','members'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===tab?'':'none';
  });
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active',['input','records','summary','members'][i]===tab);
  });
  if (tab==='records') loadRecords();
  if (tab==='summary' && !records.length) loadRecords();
  if (tab==='members') loadMembers();
}

// ── Init ─────────────────────────────────
(function init() {
  const today=new Date();
  document.getElementById('date-input').value=today.toISOString().split('T')[0];
  buildTimeOptions(document.getElementById('time-in'),9);
  buildTimeOptions(document.getElementById('time-out'),18);
  document.getElementById('time-in').addEventListener('change',updateDuration);
  document.getElementById('time-out').addEventListener('change',updateDuration);
  updateDuration();
  // セッション復元
  const saved=sessionStorage.getItem('kintai_user');
  if (saved) { currentUser=saved; showApp(); }
  else { document.getElementById('p0').focus(); }
})();
</script>
