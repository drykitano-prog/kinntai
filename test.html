<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テスト</title>
</head>
<body>
<h2>GAS接続テスト</h2>
<input type="number" id="pin" placeholder="PIN（例：1590）" style="font-size:20px;padding:10px;width:200px">
<br><br>
<button onclick="testLogin()" style="font-size:18px;padding:10px 20px">ログインテスト</button>
<br><br>
<div id="result" style="font-size:16px;padding:10px;background:#f0f0f0;min-height:40px"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyHtLRh-CBfYP9caA2wnA8Rfek5bbneJ0qiPMUoHsDzBf_zh9dWjAQzl3hj3sqANsXx2g/exec';

async function testLogin() {
  const pin = document.getElementById('pin').value;
  document.getElementById('result').textContent = '通信中...';
  try {
    const url = GAS_URL + '?action=login&pin=' + pin;
    const res = await fetch(url);
    const data = await res.json();
    document.getElementById('result').textContent = JSON.stringify(data);
  } catch(e) {
    document.getElementById('result').textContent = 'エラー: ' + e.message;
  }
}
</script>
</body>
</html>
